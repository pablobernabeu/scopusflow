url: https://pablobernabeu.github.io/scopusflow/

template:
  bootstrap: 5
  light-switch: true
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "scopusflow: a reproducible workflow layer for Scopus searches"

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io/

home:
  sidebar:
    structure: [links, license, community, citation, authors, dev, custom]
    components:
      custom:
        title: About the developer
        text: >
          A short bio and the full citation, including a BibTeX entry, are on
          the [About page](articles/about.html).

navbar:
  structure:
    left: [intro, reference, articles, about, news]
    right: [app, search, github, lightswitch]
  components:
    about:
      text: About
      href: articles/about.html
    app:
      text: App
      href: articles/using-the-app.html

# Listed explicitly so the About page can stay off the Articles index and
# dropdown (title: internal) while the guides keep their automatic listing.
articles:
- title: Guides
  navbar: Articles
  contents:
  - analysing-a-literature
  - building-a-reference-set
  - comparing-topics
  - designing-queries
  - plans-and-quota
  - tracking-literature-change
  - using-the-app
- title: internal
  contents:
  - about

reference:
- title: Plan and size
  contents:
  - scopus_plan
  - scopus_query
  - scopus_count
  - scopus_field_tags
- title: Retrieve
  contents:
  - scopus_fetch
  - scopus_fetch_plan
  - scopus_abstract
  - scopus_cache_dir
  - scopus_cache_clear
- title: Records
  contents:
  - scopus_records
  - summary.scopus_records
  - scopus_combine
  - scopus_quota
- title: DOIs and change tracking
  contents:
  - scopus_extract_dois
  - scopus_diff_dois
- title: Analyse and visualise
  contents:
  - scopus_trend
  - scopus_top
  - scopus_compare_topics
  - plot_scopus_trend
  - plot_scopus_top
  - plot_scopus_comparison
- title: Export and I/O
  contents:
  - as_bibliometrix
  - as_bibtex
  - as_ris
  - write_scopus_records
- title: App
  contents:
  - run_app
- title: Keys
  contents:
  - scopus_has_key
- title: Data
  contents:
  - example_records
