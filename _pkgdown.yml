url: https://pablobernabeu.github.io/scopusflow/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#0F6E6E"
  # Fonts are loaded here as a plain stylesheet link (Spectral for headings,
  # Inter for body, JetBrains Mono for code) and applied in pkgdown/extra.scss.
  # This avoids depending on bslib's build-time font download and keeps the
  # brand identical to the mkdocs twin.
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "scopusflow: a reproducible workflow layer for Scopus searches"

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io/

footer:
  structure:
    left: [developed_by]
    right: [legal, built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
    legal: >
      Released under the [MIT licence](LICENSE.html). 'Scopus' is a trademark of
      Elsevier; scopusflow is an independent client, not affiliated with or
      endorsed by Elsevier.

home:
  sidebar:
    # Slim the right sidebar: the citation points at the About page (not
    # pkgdown's authors.html#citation), the licence is one British-spelled link
    # (the default "MIT + file LICENSE" line also links a stub page the deploy
    # prunes), and Community shows only the contributing guide.
    structure: [links, license, community, citation, authors, dev]
    components:
      citation:
        title: Citation
        text: |
          [How to cite scopusflow](articles/about.html)

          [![DOI](https://zenodo.org/badge/DOI/10.5281/zenodo.21252669.svg)](https://doi.org/10.5281/zenodo.21252669)
      license:
        title: Licence
        text: >
          [MIT licence](LICENSE.html)
      community:
        title: Community
        text: >
          [Contributing guide](CONTRIBUTING.html)

navbar:
  # House order: Get started, Reference, Articles, Changelog, About on the left;
  # App, search, GitHub and the light/dark switch on the right.
  structure:
    left: [intro, reference, articles, news, about]
    right: [app, search, github, lightswitch]
  components:
    about:
      text: About
      href: articles/about.html
    app:
      text: App
      href: articles/using-the-app.html
      icon: fa-play
      aria-label: The code-free app
    # Define the Articles menu explicitly so the dropdown is a clean, flat list
    # of the guides: no redundant "Articles" sub-header (pkgdown adds one from a
    # group's `navbar:` key) and no "More articles..." link (pkgdown adds one
    # when an article, here the internal About page, is absent from the menu).
    articles:
      text: Articles
      menu:
      - text: Analysing and visualising a literature
        href: articles/analysing-a-literature.html
      - text: Building and exporting a reference set
        href: articles/building-a-reference-set.html
      - text: Comparing topics over time
        href: articles/comparing-topics.html
      - text: Designing precise queries across disciplines
        href: articles/designing-queries.html
      - text: Author keywords and references
        href: articles/keywords-and-references.html
      - text: Search plans and quota-aware retrieval
        href: articles/plans-and-quota.html
      - text: Tracking how a literature changes between retrievals
        href: articles/tracking-literature-change.html
      - text: Using the code-free app
        href: articles/using-the-app.html

# The Articles navbar menu is defined explicitly above; this block only groups
# the articles index page. About stays internal (off the index and the menu).
articles:
- title: Guides
  contents:
  - analysing-a-literature
  - building-a-reference-set
  - comparing-topics
  - designing-queries
  - keywords-and-references
  - plans-and-quota
  - tracking-literature-change
  - using-the-app
- title: internal
  contents:
  - about

reference:
- title: Plan and size
  contents:
  - scopus_plan
  - scopus_query
  - scopus_count
  - scopus_field_tags
- title: Retrieve
  contents:
  - scopus_fetch
  - scopus_fetch_plan
  - scopus_abstract
  - scopus_corpus
  - scopus_cache_dir
  - scopus_cache_clear
- title: Records
  contents:
  - scopus_records
  - summary.scopus_records
  - scopus_combine
  - scopus_quota
- title: DOIs and change tracking
  contents:
  - scopus_extract_dois
  - scopus_diff_dois
- title: Analyse and visualise
  contents:
  - scopus_trend
  - scopus_top
  - scopus_compare_topics
  - plot_scopus_trend
  - plot_scopus_top
  - plot_scopus_comparison
- title: Export and I/O
  contents:
  - as_bibliometrix
  - as_bibtex
  - as_ris
  - write_scopus_records
- title: App
  contents:
  - run_app
- title: Keys
  contents:
  - scopus_has_key
- title: Data
  contents:
  - example_records
