version: 2
updates:
  # Keep the GitHub Actions used by the workflows up to date. R package
  # dependencies are watched at runtime by the dependency-check workflow instead,
  # since Dependabot does not track CRAN packages.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
