# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          # Windows on R-devel is the combination win-builder checks, and the one
          # the rest of this matrix leaves uncovered (Windows is otherwise only
          # on release, R-devel only on Linux). Running it here gives the same
          # signal on every push, rather than by email after an upload.
          - {os: windows-latest, r: 'devel'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  # Verify the package works with ONLY its declared strong dependencies on the
  # path, so that nothing in R/, the examples or the tests silently relies on a
  # Suggests or transitive package. Examples and Suggests-using tests guard
  # themselves with @examplesIf / requireNamespace() / skip_if_not_installed().
  # Vignettes are skipped here because rmarkdown (the output format) is a Suggest
  # and so is absent under depends-only; the vignettes are built and checked in
  # full by the matrix job above.
  depends-only:
    runs-on: ubuntu-latest
    name: depends-only
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_DEPENDS_ONLY_: true
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # Build the vignettes normally (R CMD build sees the full library), but
          # skip RE-building them during the depends-only check, where rmarkdown
          # is absent.
          args: 'c("--no-manual", "--as-cran", "--no-vignettes")'
          build_args: 'c("--no-manual")'
