# Weekly live smoke test against the real Elsevier 'Scopus' Search API, so that a
# change to the API's response schema or auth is caught early rather than by a
# user's bug report. The offline test suite cannot cover this, since it mocks all
# HTTP. The tests skip themselves unless a SCOPUS_API_KEY secret is configured, so
# this workflow is harmless (and green) until the maintainer opts in by adding the
# key. It uses about two API requests per run.
on:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:

name: live-api-check.yaml

permissions:
  contents: read

jobs:
  live-api-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
      NOT_CRAN: "true"
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgload, any::testthat, any::withr
          needs: check

      - name: Run the live integration tests
        shell: Rscript {0}
        run: |
          pkgload::load_all(".", quiet = TRUE)
          res <- testthat::test_file(
            "tests/testthat/test-live.R",
            reporter = testthat::SummaryReporter$new()
          )
          df <- as.data.frame(res)
          cat(sprintf("\nfailed=%d skipped=%d passed=%d\n",
                      sum(df$failed), sum(df$skipped), sum(df$passed)))
          if (sum(df$failed) > 0L) {
            quit(status = 1L)
          }
