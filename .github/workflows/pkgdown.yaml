# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Remove the redundant, unrendered licence stub page
        # pkgdown always renders the bare LICENSE file (needed for CRAN's
        # "MIT + file LICENSE" field) to its own orphaned page, alongside the
        # full text built from LICENSE.md. Keep only the full-text page live.
        run: rm -f docs/LICENSE-text.html

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          # clean: true so files dropped from the build (e.g. a page whose
          # source moved out of pkgdown's scan path) are removed from the live
          # site rather than lingering as orphans. gh-pages holds only the
          # pkgdown output, so a full mirror is safe.
          clean: true
          branch: gh-pages
          folder: docs
